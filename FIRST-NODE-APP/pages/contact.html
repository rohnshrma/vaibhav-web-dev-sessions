<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Contact | DogGram</title>
    <link
      href="https://fonts.googleapis.com/css?family=Montserrat|Ubuntu&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
      integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script
      src="https://code.jquery.com/jquery-3.4.1.slim.min.js"
      integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
      integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"
      integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://kit.fontawesome.com/1e7c1fefb9.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <section id="title">
      <div class="container-fluid">
        <nav class="navbar navbar-expand-lg navbar-dark">
          <a class="navbar-brand" href="/">DogGram</a>
          <button
            class="navbar-toggler"
            type="button"
            data-toggle="collapse"
            data-target="#navbarTogglerContact"
            aria-controls="navbarTogglerContact"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarTogglerContact">
            <ul class="navbar-nav ml-auto">
              <li class="nav-item">
                <a class="nav-link" href="/">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/about">About</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/contact">Contact</a>
              </li>
            </ul>
          </div>
        </nav>

        <div class="row">
          <div class="col-lg-6">
            <h1>Contact DogGram</h1>
            <p class="text-light">Reach out for collaboration and feedback.</p>
            <button class="btn btn-dark btn-lg download-button" type="button">
              <i class="fas fa-envelope"></i> hello@doggram.app
            </button>
          </div>
          <div class="col-lg-6">
            <img class="brand-img" src="https://tindog-pro.netlify.app/iphone6.png" alt="iphone-mockup" />
          </div>
        </div>
      </div>
    </section>

    <section id="features">
      <div class="container">
        <div class="row">
          <div class="col-lg-4 features-box">
            <i class="icon fas fa-envelope-open-text fa-4x"></i>
            <h3>Email</h3>
            <p>hello@doggram.app</p>
          </div>
          <div class="col-lg-4 features-box">
            <i class="icon fas fa-phone fa-4x"></i>
            <h3>Phone</h3>
            <p>+1 (555) 010-1234</p>
          </div>
          <div class="col-lg-4 features-box">
            <i class="icon fas fa-map-marker-alt fa-4x"></i>
            <h3>Address</h3>
            <p>123 Dog Street, New York, NY</p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
